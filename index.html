<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled readonly>
        <div class="buttons">

            <button onclick="clearDisplay()">C</button>
            <button onclick="appendValueDisplay('7')">7</button>
            <button onclick="appendValueDisplay('8')">8</button>
            <button onclick="appendValueDisplay('9')">9</button>
            <button onclick="appendValueDisplay('/')">/</button>
            <button onclick="deleteLast()">DEL</button>

            <button onclick="appendValueDisplay('4')">4</button>
            <button onclick="appendValueDisplay('5')">5</button>
            <button onclick="appendValueDisplay('6')">6</button>
            <button onclick="appendValueDisplay('*')">*</button>

            <button onclick="appendValueDisplay('1')">1</button>
            <button onclick="appendValueDisplay('2')">2</button>
            <button onclick="appendValueDisplay('3')">3</button>
            <button onclick="appendValueDisplay('-')">-</button>

            <button onclick="appendValueDisplay('0')">0</button>
            <button onclick="appendValueDisplay('.')">.</button>
            <button onclick="calculate()">=</button>
            <button onclick="appendValueDisplay('+')">+</button>

            <button onclick="appendValueDisplay('.')">C</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
